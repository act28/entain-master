version: "2"

run:
  timeout: 5m
  allow-parallel-runners: true
  go: "1.16"

linters:
  default: none
  enable:
    # === Code Quality & Correctness ===
    - errcheck # Check for unchecked errors
    - govet # Run go vet (official Go tool)
    - staticcheck # Advanced static analysis (includes gosimple)
    - unused # Check for unused code
    - ineffassign # Detect ineffective assignments

    # === Idiomatic Go & Style ===
    - misspell # Check spelling
    - unconvert # Remove unnecessary type conversions
    - unparam # Report unused function parameters

    # === Bug Detection ===
    - gosec # Security issues
    - nakedret # Check for naked returns
    # copyloopvar requires Go 1.22+
    - durationcheck # Check for duration multiplication issues
    - errname # Check error variable naming
    - nilerr # Check for returning nil errors
    - noctx # Check for missing context in HTTP requests
    - prealloc # Check for slice preallocation opportunities
    - predeclared # Check for shadowing of predeclared identifiers
    - rowserrcheck # Check for sql.Rows error handling
    - sqlclosecheck # Check for sql.Rows/Stmt close calls
    - wastedassign # Check for wasted assignments

    # === Complexity & Maintainability ===
    - gocyclo # Check cyclomatic complexity
    - dupl # Check for code duplication
    - funlen # Check function length
    - gocognit # Check cognitive complexity
    - nestif # Check for deeply nested if statements
    - goprintffuncname # Check printf function names

    # === Best Practices ===
    - asciicheck # Check for non-ASCII identifiers
    - containedctx # Check for context.Context in structs
    - contextcheck # Check for context usage
    - decorder # Check declaration order
    - dogsled # Check for excessive blank identifiers
    - errchkjson # Check for JSON errors
    - errorlint # Check error wrapping
    - exhaustive # Check exhaustiveness of switch statements
    - forcetypeassert # Check for forced type assertions
    - gochecknoinits # Check for init functions
    - goconst # Check for repeated strings/constants
    - gocritic # Opinionated linter with many rules
    - godot # Check comment periods
    - godox # Check for TODO/FIXME comments
    - gomodguard # Check allowed/blocked modules
    - grouper # Check for grouped declarations
    - importas # Check import aliases
    - interfacebloat # Check for large interfaces
    - maintidx # Check maintainability index
    - makezero # Check for make with zero length
    - mirror # Check for mirror functions
    - mnd # Check for magic numbers
    - musttag # Check for struct tags
    - nolintlint # Check nolint directives
    - nonamedreturns # Check for named returns
    - nosprintfhostport # Check for sprintf with host:port
    - paralleltest # Check for parallel test calls
    - promlinter # Check Prometheus metrics
    - reassign # Check for variable reassignments
    - tagliatelle # Check struct field tags
    - testableexamples # Check for testable examples
    - tparallel # Check for parallel test calls
    - usestdlibvars # Check for standard library variables
    - varnamelen # Check variable name length
    - whitespace # Check for unnecessary whitespace

  exclusions:
    generated: strict
    rules:
      # Exclude some linters from running on tests files
      - path: _test\.go
        linters:
          - gocyclo
          - errcheck
          - dupl
          - gosec
          - gocognit
          - funlen
          - maintidx
      # Exclude generated code
      - path: '.*\.pb\.go$'
        text: "Code generated by.*DO NOT EDIT"
    paths:
      - proto/racing
      - proto/google

  settings:
    gocyclo:
      min-complexity: 15

    dupl:
      threshold: 100

    goconst:
      min-len: 3
      min-occurrences: 3

    gocritic:
      enabled-tags:
        - diagnostic
        - performance
        - style
      disabled-checks:
        - whyNoLint
        - importShadow
        - unnamedResult

    funlen:
      lines: 100
      statements: 50

    godot:
      scope: toplevel
      exclude:
        - "^fixme:"
        - "^TODO:"

    varnamelen:
      max-distance: 10
      min-name-length: 2
      ignore-names:
        - err
        - id
        - ok
        - wg
        - mu
      ignore-decls:
        - c echo.Context
        - t testing.T
        - f *os.File
        - T any
        - i int

    lll:
      line-length: 120
      tab-width: 4

    mnd:
      checks:
        - argument
        - case
        - condition
        - operation
        - return
      ignored-numbers:
        - "0"
        - "1"
        - "2"
        - "3"
      ignored-functions:
        - strings.SplitN

    nakedret:
      max-func-lines: 30

    tagliatelle:
      case:
        rules:
          json: snake
          yaml: snake

    nolintlint:
      allow-unused: false
      require-explanation: true
      require-specific: true

formatters:
  settings:
    gci:
      sections:
        - standard
        - default
        - prefix(git.neds.sh/matty/entain)

    goimports:
      local-prefixes:
        - git.neds.sh/matty/entain
