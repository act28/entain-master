syntax = "proto3";
package racing;

import "google/protobuf/timestamp.proto";

option go_package = "/racing";

service Racing {
  // ListRaces will return a collection of all races.
  rpc ListRaces(ListRacesRequest) returns (ListRacesResponse) {}

  // GetRace returns a single race by its ID.
  rpc GetRace(GetRaceRequest) returns (GetRaceResponse) {}
}

/* Requests/Responses */

message ListRacesRequest {
  ListRacesRequestFilter filter = 1;
}

// Response to ListRaces call.
message ListRacesResponse {
  repeated Race races = 1;
}

// Filter for listing races.
message ListRacesRequestFilter {
  repeated int64 meeting_ids = 1;
  // Optional filter for visible races. If not set, returns both visible and invisible races.
  optional bool visible = 2;
  // Optional field to specify which field to sort by.
  // Supported values: "advertised_start_time", "name", "id", "meeting_id", "number"
  // If not set, defaults to "advertised_start_time".
  optional string sort_by = 3;
  // Optional field to specify sort direction.
  // If true, sorts in descending order (latest first).
  // If false or not set, sorts in ascending order (earliest first).
  optional bool descending = 4;
}

/* Resources */

// A race resource.
message Race {
  // Status represents the current state of a race.
  enum Status {
    // UNSPECIFIED indicates an unknown status.
    UNSPECIFIED = 0;
    // OPEN indicates the race has not yet started.
    OPEN = 1;
    // CLOSED indicates the race has started or finished.
    CLOSED = 2;
  }
  // ID represents a unique identifier for the race.
  int64 id = 1;
  // MeetingID represents a unique identifier for the races meeting.
  int64 meeting_id = 2;
  // Name is the official name given to the race.
  string name = 3;
  // Number represents the number of the race.
  int64 number = 4;
  // Visible represents whether or not the race is visible.
  bool visible = 5;
  // AdvertisedStartTime is the time the race is advertised to run.
  google.protobuf.Timestamp advertised_start_time = 6;
  // Status represents whether the race is open or closed for betting.
  // Computed based on advertised_start_time vs current time:
  // - OPEN: when current time is strictly before advertised_start_time
  // - CLOSED: when current time is at or after advertised_start_time
  Status status = 7;
}

/* GetRace Request/Response */

// Request for GetRace call.
message GetRaceRequest {
  // The unique ID of the race to retrieve.
  int64 id = 1;
}

// Response to GetRace call.
message GetRaceResponse {
  // The requested race resource.
  Race race = 1;
}
